name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      # PATH_PREFIX is derived from the repo name automatically (e.g. "ECE" -> "/ECE/"),
      # so this keeps working even if the repo is renamed — no hardcoded path here.
      - run: npm run build
        env:
          PATH_PREFIX: /${{ github.event.repository.name }}/
      # On PRs this just confirms the build succeeds — no deploy.
      - if: github.event_name == 'pull_request'
        run: echo "Build succeeded — site renders cleanly with these changes."
      - if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
